name: Deploy Docs (nene-records.dev)

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to heteml via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HETEML_FTP_HOST }}
          username: ${{ secrets.HETEML_FTP_USER_DOCS }}
          password: ${{ secrets.HETEML_FTP_PASS_DOCS }}
          local-dir: docs/dist/
          server-dir: ${{ secrets.HETEML_FTP_DIR_DOCS }}
          dangerous-clean-slate: false
